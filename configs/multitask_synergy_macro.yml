tasks:
  synergy:
    enabled: true
    weight: 1.0
  macro_link:
    enabled: true
    weight: 0.2
    every_n_steps: 1

dataset:
  synergy:
    samples: data/proc/v7/oneil/samples_idx_dc.tsv
    synergy_type: loewe
    cell_protein_association: data/proc/v7/oneil/cell_line_protein_asso_up100dn100_idx.tsv
    num_folds: 5
    test_fold: 0
    train:
      loader:
        batch_size: 256
        shuffle: true
        pin_memory: true
    valid:
      loader:
        batch_size: 512
        shuffle: false
        pin_memory: true
    test:
      loader:
        batch_size: 512
        shuffle: false
        pin_memory: true

  macro:
    name: heterograph
    raw_dir: data/proc/pretrain_macro/
    val_rate: 0.05
    test_rate: 0.05
    n_protein_features: 256
    n_sideeffect_features: 256

model:
  synergy:
    hidden_size: 384
    drug_size: 38
    drug_hidden_size: 256
    protein_size: 4871
    protein_hidden_size: 256
    project_with_bias: false
    drug_feature_file: data/proc/v7/oneil/drug_feat.npy
    protein_feature_file: data/proc/v7/oneil/protein_feat.npy
    freeze_embedding: true
    add_pooler: true
    num_attention_heads: 8
    num_hidden_layers: 3
    intermediate_size: 1536
    hidden_dropout_prob: 0.1
    attention_probs_dropout_prob: 0.1
    predict_head_dropout: 0.1
    initializer_range: 0.025

  macro:
    num_layers: 2
    hidden_dim: 128
    num_heads: 8
    dropout: 0.2

trainer:
  patience: 30
  num_epochs: 200
  optimizer:
    lr: 2.0e-4
    weight_decay: 1.0e-3
  scheduler:
    name: constant_with_warmup
    params:
      num_training_steps: 30000
      num_warmup_steps: 2000

gpu: 0
model_dir: output/v7/multitask_synergy_macro
